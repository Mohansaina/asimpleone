<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Start Screen -->
    <div class="screen active" id="start-screen">
        <h1>Quiz Game</h1>
        <p>Hey! This is a quiz game. Try your best 🚀</p>
        <button id="start-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div class="screen" id="quiz-screen">
        <div class="quiz-header">
            <h2 id="question-text">Questions will display here</h2>

            <div class="quiz-info">
                <p>Question <span id="current-question">1</span> of <span id="total-questions">5</span></p>
                <p>Score: <span id="score">0</span></p>
            </div>
        </div>

        <div id="answer-container" class="answer-container"></div>

        <div class="progress-bar">
            <div id="progress" class="progress"></div>
        </div>
    </div>

    <!-- Result Screen -->
    <div class="screen" id="result-screen">
        <h1>Quiz Result</h1>
        <p>You scored <span id="final-score">0</span> / <span id="max-score">5</span></p>
        <p id="result-message"></p>
        <button id="restart-btn">Restart</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
